<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        img{
            border-radius: 20px;      
        }
        div{
            width: 200px;
            height: 200px;
            position:absolute
        }
        .satu{
            background-color: salmon;
            border-radius: 20px;
            z-index: 3;
        }
        .dua{
            background-color: lightgreen;
            border-radius:20px;
            top: 100px;
            left: 100px;
            z-index: 2;
        }
        .tiga{
            background-color: royalblue;
            border-radius:20px;
            top: 200px;
            left: 200px;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="satu">
        <img src="keonho2.jpg" alt="" width="200px" height="200px">
    </div>
    <div class="dua">
        <img src="keonho1.jpg" alt="" width="200px" height="200px">
    </div>
    <div class="tiga">
        <img src="keonho3.jpg" alt="" width="200px" height="200px">
    </div>
</body>
</html>
