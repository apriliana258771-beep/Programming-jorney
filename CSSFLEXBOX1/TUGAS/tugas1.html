<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex Box dengan flex-dirextion row</title>
    <style>
        h1 {
            text-align: center;
        }
        .container {
            width: 600px;
            margin: 30px auto;
            padding: 5px;
            display: flex;
            justify-content: center;
            
        }
        .container img {
            width: 150px;
            height:150px;
            background-color: blue;
            margin: 5px; 
            border-radius: 10%;

        }
    </style>
</head>
<body>
    <h1>Galeri Sylus</h1>
    <div class="container">
        <img src="sylus1.jpg" alt="sylus1">
        <img src="sylus2.jpg" alt="sylus2">
        <img src="sylus3.jpg" alt="sylus3">
        <img src="sylus4.jpg" alt="sylus4">
    </div>
</body>
</html>
