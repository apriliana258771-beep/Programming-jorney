<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>imagegallery</title>
        <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #476f95;
            text-align: center;
        }
        div.gallery {
            display: flex;
            justify-content: center;
            align-items: center;
            text-shadow: #777 1px 1px 2px;
        }
        div.gallery-item {
            margin: 13px;
            border: 3px solid #edede2;
            width: 180px;
            justify-content: center;
            display: flex;
            flex-direction: column;

        }
        div.gallery-item:hover {
            border: 1px solid #777;
        }
        div.gallery-item img {
            width: 100%;
            height: auto;
        }
        div.gallery-item div.desc {
            padding: 15px;
            background-color: whitesmoke;
        }
        </style>
</head>
<body>
    <H1>GALERRY MY MINE</H1>
    <div class="gallery">
    <div class="gallery-item">
        <a target="_blank" href="my bojo.jpg">
            <img src="my bojo.jpg" alt="my bojo" width="600" height="400">
        </a>
        <div class="desc">my suami</div>
    </div>

    <div class="gallery-item">
        <a target="_blank" href="syluss.jpg">
            <img src="syluss.jpg" alt="syluss" width="600" height="400">
        </a>
        <div class="desc">my bojo</div>
    </div>

    <div class="gallery-item">
        <a target="_blank" href="my mine.jpg">
            <img src="my mine.jpg" alt="my mine" width="600" height="400">
        </a>
        <div class="desc">my mine</div>
    </div>

    <div class="gallery-item">
        <a target="_blank" href="my husband.jpg">
            <img src="my husband.jpg" alt="my husband" width="600" height="400">
        </a>
        <div class="desc">my husband</div>
    </div>

    </div>
</body>
</html>
